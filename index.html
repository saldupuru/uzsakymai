<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Užsakymų administravimas</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#B8355F">
<link rel="apple-touch-icon" href="./icon-192.png">
</head>
<body>
<div id="app"></div>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Noto+Serif:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');

:root{
  --cream:#FFF8EF;
  --box:#F3E7D2;
  --box-line:#E2D0AE;
  --choc:#3B2A28;
  --choc-soft:#6E5A52;
  --berry:#B8355F;
  --berry-deep:#8E2748;
  --sage:#7C8F5A;
  --sage-deep:#5E6E42;
  --gold:#C9932E;
  --muted-red:#A64B4B;
  --white:#FFFFFF;
}

*{box-sizing:border-box;}
#app{
  font-family:'Inter',sans-serif;
  color:var(--choc);
  background:var(--cream);
  min-height:100vh;
  padding:28px 20px 60px;
}

.wrap{max-width:1180px;margin:0 auto;}

/* header */
.header{display:flex;align-items:center;gap:12px;margin-bottom:28px;flex-wrap:wrap;}
.header svg{flex-shrink:0;}
.header-logo{width:88px;height:88px;object-fit:contain;border-radius:50%;flex-shrink:0;}
@media (max-width:640px){
  .header{flex-direction:column;align-items:center;text-align:center;gap:10px;}
  .header-logo{width:104px;height:104px;}
  .header h1{font-size:22px;}
  .header .btn{margin-left:0 !important;width:100%;max-width:300px;font-size:12px;padding:9px 10px;}
}
.header h1{font-family:'Fraunces','Noto Serif',serif;font-weight:600;font-size:30px;margin:0;letter-spacing:-0.01em;}
.header p{margin:2px 0 0;color:var(--choc-soft);font-size:14px;}

/* layout */
.layout{
  display:grid;grid-template-columns:340px 1fr;gap:24px;align-items:start;
  isolation:isolate;
}
@media (max-width:880px){ .layout{grid-template-columns:1fr;} }

/* panel (sidebar) */
.panel{
  background:var(--white);border-radius:14px;border:1px solid var(--box-line);
  padding:20px;position:relative;z-index:1;
}
@media (min-width:881px){ .panel{position:sticky;top:20px;} }
.panel h2{font-family:'Fraunces','Noto Serif',serif;font-size:18px;font-weight:600;margin:0 0 4px;}
.panel .hint{font-size:12.5px;color:var(--choc-soft);margin:0 0 14px;line-height:1.5;}
textarea.paste{
  width:100%;min-height:100px;border:1.5px dashed var(--box-line);border-radius:10px;
  padding:10px 12px;font-family:'Inter',sans-serif;font-size:13.5px;resize:vertical;
  background:var(--cream);color:var(--choc);
}
textarea.paste:focus{outline:none;border-color:var(--berry);}

.btn{
  font-family:'Inter',sans-serif;font-weight:600;font-size:13.5px;border:none;
  border-radius:9px;padding:10px 16px;cursor:pointer;transition:transform .08s ease, opacity .15s ease;
}
.btn:active{transform:scale(0.97);}
.btn-primary{background:var(--berry);color:#fff;}
.btn-primary:hover{background:var(--berry-deep);}
.btn-ghost{background:transparent;color:var(--choc);border:1.5px solid var(--box-line);}
.btn-ghost:hover{border-color:var(--berry);color:var(--berry);}
.btn-sm{padding:6px 10px;font-size:12px;border-radius:7px;}
.btn-block{width:100%;margin-top:10px;}

.divider{border:none;border-top:1px solid var(--box-line);margin:18px 0;}

/* form */
.field{margin-bottom:12px;}
.field label{
  display:block;font-size:12px;font-weight:600;color:var(--choc-soft);
  margin-bottom:4px;text-transform:uppercase;letter-spacing:.03em;
}
.field input,.field select,.field textarea{
  width:100%;border:1.5px solid var(--box-line);border-radius:8px;padding:8px 10px;
  font-family:'Inter',sans-serif;font-size:13.5px;background:var(--cream);color:var(--choc);
}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--berry);}
.field textarea{min-height:56px;resize:vertical;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.row3 .field label{font-size:11px;}
.product-info-text{
  font-size:11.5px;color:var(--choc-soft);font-weight:400;font-style:italic;
  margin:-2px 0 5px;opacity:.85;
}
.checkrow{display:flex;align-items:center;gap:8px;font-size:13.5px;margin-top:2px;}
.checkrow input{width:auto;}

/* filter tabs */
.tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;position:relative;z-index:1;}
.tab{
  font-size:12.5px;font-weight:600;padding:7px 13px;border-radius:20px;
  border:1.5px solid var(--box-line);background:var(--white);color:var(--choc-soft);
  cursor:pointer;white-space:nowrap;
}
.tab.active{background:var(--choc);color:var(--white);border-color:var(--choc);}
.searchbox{margin-left:auto;min-width:180px;}
.searchbox input{
  width:100%;border:1.5px solid var(--box-line);border-radius:20px;
  padding:7px 14px;font-size:13px;background:var(--white);
}
.searchbox input:focus{outline:none;border-color:var(--berry);}

/* cards grid */
.grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;
  position:relative;z-index:1;
}

.ticket{
  background:var(--box);border-radius:14px;position:relative;padding:16px 16px 14px;
  border:1px solid var(--box-line);cursor:pointer;
  transition:box-shadow .15s ease, transform .1s ease;
}
.ticket:hover{box-shadow:0 6px 18px rgba(59,42,40,0.12);transform:translateY(-1px);}
.ticket-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;}
.ticket-name{font-family:'Fraunces','Noto Serif',serif;font-weight:600;font-size:16.5px;line-height:1.25;}
.ticket-ordernum{
  font-family:'Inter',sans-serif;font-size:11px;font-weight:600;color:var(--choc-soft);
  margin-left:8px;vertical-align:middle;
}
.stamp{
  font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;
  padding:4px 9px;border-radius:20px;transform:rotate(-3deg);white-space:nowrap;flex-shrink:0;
}
.stamp.laukia_patvirtinimo{background:#EAD4D4;color:var(--muted-red);}
.stamp.aktyvus{background:#F3E0B5;color:#8C6415;}
.stamp.pagaminta{background:#F3D3DE;color:var(--berry-deep);}
.stamp.ivykdyta{background:#CFE0BE;color:var(--sage-deep);}

.ticket-meta{font-size:12.5px;color:var(--choc-soft);margin:2px 0;}
.ticket-unit-line{padding-left:10px;}
.ticket-ordinal{font-weight:700;color:var(--choc);margin-top:6px;}
.ticket-date-line{
  font-size:14.5px;padding-bottom:9px;margin-bottom:8px;
  border-bottom:1.5px solid var(--box-line);
}
.ticket-meta b{color:var(--choc);font-weight:600;}
.perf{border-top:1.5px dashed var(--box-line);margin:10px 0;}
.ticket-bottom{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;gap:8px;}
.ticket-bottom-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end;}
.phone-text{color:var(--choc-soft);font-weight:600;white-space:nowrap;}
.price-text{font-weight:700;white-space:nowrap;}
.paid-pill{font-weight:700;font-size:11px;padding:3px 8px;border-radius:12px;white-space:nowrap;}
.paid-pill.yes{background:#DCE6CC;color:var(--sage-deep);}
.paid-pill.no{background:#F3D3DE;color:var(--berry-deep);}

.empty{text-align:center;padding:60px 20px;color:var(--choc-soft);}
.empty svg{margin-bottom:10px;}
.empty-logo{width:72px;height:72px;object-fit:contain;border-radius:50%;margin-bottom:10px;opacity:.85;}
.empty h3{font-family:'Fraunces','Noto Serif',serif;font-size:19px;color:var(--choc);margin:0 0 6px;}
.empty p{font-size:13.5px;margin:0;}

/* modal */
.overlay{
  position:fixed;inset:0;background:rgba(59,42,40,0.4);
  display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;
}
.modal{
  background:var(--white);border-radius:16px;max-width:520px;width:100%;
  max-height:88vh;overflow-y:auto;padding:24px;
}
.modal h2{font-family:'Fraunces','Noto Serif',serif;font-size:20px;margin:0 0 14px;}
.modal-close{
  position:absolute;top:14px;right:16px;background:none;border:none;
  font-size:20px;cursor:pointer;color:var(--choc-soft);
}
.modal-actions{display:flex;gap:8px;margin-top:16px;}

.status-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.confirm-order-row{
  background:#DCE6CC;border-radius:12px;padding:14px;margin-top:14px;
}
.confirm-order-btn{background:var(--sage-deep);}
.confirm-order-btn:hover{background:var(--sage);}
.invoice-issued-box{
  background:var(--cream);border:1px solid var(--box-line);border-radius:10px;padding:12px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;font-size:13px;
}
.attach-add-btn{
  display:inline-block;cursor:pointer;color:var(--berry);font-size:12.5px;font-weight:600;
  border:1px dashed var(--berry);border-radius:12px;padding:1px 7px;margin-left:2px;
}
.attach-add-btn:hover{background:#FCEFF3;}
.status-btn{
  font-size:11.5px;font-weight:600;padding:6px 10px;border-radius:8px;
  border:1.5px solid var(--box-line);background:var(--cream);cursor:pointer;
}
.status-btn.current{border-color:var(--choc);background:var(--choc);color:#fff;}

/* view toggle */
.view-toggle{display:flex;gap:6px;margin-bottom:16px;}
.view-btn{
  font-size:13px;font-weight:600;padding:8px 16px;border-radius:9px;
  border:1.5px solid var(--box-line);background:var(--white);color:var(--choc-soft);cursor:pointer;
}
.view-btn.active{background:var(--choc);color:#fff;border-color:var(--choc);}

.cal-section{background:var(--white);border:1px solid var(--box-line);border-radius:16px;padding:22px;margin-bottom:28px;}
.section-title{font-family:'Fraunces','Noto Serif',serif;font-size:18px;font-weight:600;margin:0 0 12px;}
.add-order-row{
  display:flex;justify-content:center;margin-bottom:28px;
}

/* calendar */
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-head h3{font-family:'Inter',sans-serif;font-size:19px;font-weight:700;margin:0;color:var(--choc);}
.cal-nav{display:flex;gap:6px;}
.cal-nav button{
  width:32px;height:32px;border-radius:8px;border:1.5px solid var(--box-line);
  background:var(--white);cursor:pointer;font-size:15px;color:var(--choc);
}
.cal-nav button:hover{border-color:var(--berry);color:var(--berry);}
.cal-shrink{max-width:50%;margin:0 auto;container-type:inline-size;}
@media (max-width:640px){
  .cal-shrink{max-width:100%;}
}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:22px;}
.cal-dow{
  text-align:center;font-size:11px;font-weight:700;color:var(--choc-soft);
  text-transform:uppercase;letter-spacing:.03em;padding-bottom:4px;
}
.cal-day{
  width:100%;aspect-ratio:1/1;box-sizing:border-box;background:var(--white);border:1.5px solid var(--box-line);
  border-radius:18%;padding:5%;cursor:pointer;position:relative;display:flex;flex-direction:column;
}
.cal-day.empty{background:transparent;border:none;cursor:default;}
.cal-day.today{border-color:var(--gold);border-width:2px;}
.cal-day-vacation{background:repeating-linear-gradient(135deg,var(--box) 0 6px,#EAD4D4 6px 12px);opacity:.75;}
.cal-day-vacation .cal-daynum{color:var(--muted-red);}
.vacation-warning{
  background:#F3D3DE;color:var(--berry-deep);border-radius:10px;padding:10px 12px;
  font-size:13px;line-height:1.5;margin:-6px 0 14px;
}
.date-suggest-btn{
  background:var(--white);border:1.5px solid var(--berry-deep);color:var(--berry-deep);
  border-radius:14px;padding:2px 9px;font-size:12.5px;font-weight:600;cursor:pointer;
  margin:0 2px;
}
.cal-day.selected{border-color:var(--berry);background:#FCEFF3;}
.cal-day:hover:not(.empty){border-color:var(--berry);}
.cal-daynum{font-size:clamp(8px, 4.2cqw, 15px);font-weight:700;color:var(--choc);}
.cal-dots{display:flex;flex-wrap:wrap;gap:4%;margin-top:auto;align-items:center;}
.cal-dot{width:16%;aspect-ratio:1/1;border-radius:50%;box-shadow:0 0 0 1px rgba(255,255,255,0.9) inset;flex-shrink:0;}
.cal-dot.laukia_patvirtinimo{background:var(--muted-red);}
.cal-dot.aktyvus{background:var(--gold);}
.cal-dot.pagaminta{background:var(--berry);}
.cal-dot.ivykdyta{background:var(--sage-deep);}
.cal-more{font-size:clamp(7px, 3.2cqw, 11px);color:var(--choc-soft);font-weight:700;}

.day-panel{background:var(--white);border:1px solid var(--box-line);border-radius:14px;padding:18px;}
.day-panel h3{font-family:'Fraunces','Noto Serif',serif;font-size:17px;margin:0 0 12px;text-transform:capitalize;}

.raw-msg{
  background:var(--cream);border:1px solid var(--box-line);border-radius:8px;
  padding:10px;font-size:12.5px;color:var(--choc-soft);white-space:pre-wrap;
  max-height:100px;overflow-y:auto;margin-top:4px;
}
.loading{text-align:center;padding:40px;color:var(--choc-soft);font-size:13.5px;}

/* warehouse / prices shared sections */
.wh-section{background:var(--white);border:1px solid var(--box-line);border-radius:16px;padding:22px;margin-top:28px;}
.wh-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.wh-head-left{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;}
.wh-head .section-title{margin:0;}
.wh-chevron{transition:transform .15s ease;color:var(--choc-soft);flex-shrink:0;}
.wh-chevron.open{transform:rotate(180deg);}
.wh-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:18px;}
@media (max-width:760px){ .wh-grid{grid-template-columns:1fr;} }
.wh-col h4{font-family:'Fraunces','Noto Serif',serif;font-size:14.5px;font-weight:600;margin:0 0 8px;color:var(--choc);}
.wh-add-row{display:flex;gap:6px;margin-bottom:10px;}
.wh-add-row input{
  flex:1;border:1.5px solid var(--box-line);border-radius:8px;padding:7px 10px;
  font-size:13px;background:var(--cream);color:var(--choc);
}
.wh-add-row input:focus{outline:none;border-color:var(--berry);}
.wh-add-row button{border-radius:8px;padding:7px 13px;}
.chip-list{display:flex;flex-wrap:wrap;gap:6px;min-height:20px;}
.wh-empty{font-size:12px;color:var(--choc-soft);margin:0;}
.chip{
  display:inline-flex;align-items:center;gap:6px;background:var(--box);border:1px solid var(--box-line);
  border-radius:16px;padding:4px 6px 4px 11px;font-size:12.5px;color:var(--choc);
}
.chip-dot{width:11px;height:11px;border-radius:50%;border:1px solid rgba(0,0,0,0.15);flex-shrink:0;}
.chip-x{
  border:none;background:transparent;color:var(--choc-soft);cursor:pointer;
  font-size:14px;line-height:1;padding:2px 4px;border-radius:50%;
}
.chip-x:hover{background:rgba(184,53,95,0.15);color:var(--berry);}
.wh-stock-row{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:7px 0;border-bottom:1px solid var(--box-line);font-size:13px;
}
.wh-stock-row:last-child{border-bottom:none;}
.wh-stock-row input{
  width:70px;border:1.5px solid var(--box-line);border-radius:8px;padding:6px 8px;
  font-size:13px;text-align:center;background:var(--cream);color:var(--choc);
}
.wh-stock-row input:focus{outline:none;border-color:var(--berry);}
.price-input-wrap{display:flex;align-items:center;gap:5px;}
.price-input{
  width:78px;border:1.5px solid var(--box-line);border-radius:8px;padding:6px 8px;
  font-size:13px;text-align:right;background:var(--cream);color:var(--choc);
}
.price-input:focus{outline:none;border-color:var(--berry);}
.extra-row{
  border-bottom:1px solid var(--box-line);padding:10px 0;
}
.extra-row:last-child{border-bottom:none;}
.extra-row-top{
  display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;
}
.extra-row-name{font-size:13.5px;font-weight:600;color:var(--choc);word-break:break-word;}
.extra-row-prices{display:flex;flex-wrap:wrap;gap:14px;}
.extra-price-field{
  display:flex;align-items:center;gap:6px;font-size:12px;color:var(--choc-soft);
}
.price-eur{font-size:12.5px;color:var(--choc-soft);}

/* per-unit flavor/color pickers */
.unit-block{background:var(--cream);border:1px solid var(--box-line);border-radius:10px;padding:12px 12px 10px;margin-bottom:10px;}
.product-group-label{
  font-family:'Fraunces','Noto Serif',serif;font-weight:600;font-size:13.5px;color:var(--berry-deep);
  text-transform:uppercase;letter-spacing:.04em;margin:4px 0 8px;
}
.product-divider{
  border:none;border-top:1.5px dashed var(--box-line);margin:20px 0;
}
.ticket-divider{
  border:none;border-top:1px dashed rgba(59,42,40,0.18);margin:6px 0;
}
.unit-title{font-family:'Fraunces','Noto Serif',serif;font-weight:600;font-size:13.5px;margin-bottom:8px;}
.combo-list{margin-top:10px;}
.combo-line{
  display:flex;align-items:center;gap:10px;padding:7px 2px;
  border-bottom:1px solid var(--box-line);font-size:13px;
}
.combo-line:last-child{border-bottom:none;}
.combo-line-label{color:var(--choc-soft);font-size:12px;min-width:64px;flex-shrink:0;}
.combo-line-text{color:var(--berry-deep);font-weight:700;flex:1;}
.chip-x-mini{
  border:none;background:transparent;color:var(--choc-soft);cursor:pointer;
  font-size:15px;line-height:1;padding:2px 6px;border-radius:50%;
}
.chip-x-mini:hover{background:rgba(184,53,95,0.15);color:var(--berry);}
.pick-label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--choc-soft);margin:6px 0 5px;}
.chip-picker{display:flex;flex-wrap:wrap;gap:6px;}
.pick-chip{
  border:1.5px solid var(--box-line);background:var(--white);color:var(--choc);
  border-radius:16px;padding:5px 11px;font-size:12.5px;cursor:pointer;
}
.pick-chip:hover{border-color:var(--berry);}
.pick-chip.selected{background:var(--berry);border-color:var(--berry);color:#fff;}
.unit-result{margin-top:8px;font-size:12.5px;font-weight:600;color:var(--berry-deep);}
.qty-inline{width:80px;flex-shrink:0;}
.combo-hint{font-size:12px;color:var(--choc-soft);margin:4px 0 0;line-height:1.4;}
.extras-picker{margin-top:8px;display:flex;flex-direction:column;gap:2px;}
.size-toggle-row{display:flex;gap:14px;margin-bottom:2px;}
.size-toggle{
  display:flex;align-items:center;gap:6px;font-size:13.5px;font-weight:500;
  cursor:pointer;color:var(--choc);
}
.size-toggle input{width:auto;}
.extras-check-row{
  display:flex;align-items:center;gap:8px;font-size:13px;padding:5px 0;
  border-bottom:1px solid var(--box-line);cursor:pointer;
}
.extras-check-row:last-child{border-bottom:none;}
.extras-check-row input{width:auto;flex-shrink:0;}
.extras-check-row span:first-of-type{flex:1;}
.extras-price{color:var(--berry-deep);font-weight:600;font-size:12px;white-space:nowrap;}

/* color bubbles */
.color-bubbles{display:flex;flex-wrap:wrap;gap:9px;}
.color-bubble{
  width:28px;height:28px;border-radius:50%;border:2px solid var(--box-line);
  cursor:pointer;padding:0;position:relative;flex-shrink:0;
}
.color-bubble:hover{border-color:var(--choc-soft);}
.color-bubble.selected{border-color:var(--berry);box-shadow:0 0 0 2px var(--berry);}
.color-bubble.selected::after{
  content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  color:var(--choc);font-size:13px;font-weight:700;text-shadow:0 0 3px rgba(255,255,255,0.9), 0 0 1px rgba(255,255,255,0.9);
}

/* quantity badges on ticket */
.qty-row{display:flex;gap:10px;margin:8px 0 2px;flex-wrap:wrap;}
.qty-badge{display:inline-flex;align-items:center;gap:3px;font-size:12px;color:var(--choc-soft);font-weight:600;}
.qty-badge svg{color:var(--berry);}

.price-hint-row{display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin:-6px 0 12px;font-size:12px;color:var(--choc-soft);}
.price-auto-btn{font-size:11.5px;background:none;border:none;color:var(--berry);cursor:pointer;font-weight:600;text-decoration:underline;padding:0;}

/* customer-facing order screen */
.customer-wrap{max-width:560px;}
.customer-logo-wrap{display:flex;justify-content:center;margin-bottom:24px;}
.customer-logo{width:190px;height:190px;object-fit:contain;border-radius:50%;}
.customer-form-card{
  background:var(--white);border:1px solid var(--box-line);border-radius:18px;
  padding:28px 24px;
}
.customer-title{
  font-family:'Fraunces','Noto Serif',serif;font-weight:600;font-size:24px;margin:0 0 4px;text-align:center;
}
.customer-ordernum{
  text-align:center;font-size:13px;color:var(--choc-soft);font-weight:600;margin:0 0 20px;
}
.thank-you-banner{
  background:#DCE6CC;color:var(--sage-deep);border-radius:10px;padding:12px 14px;
  font-size:13.5px;font-weight:500;margin-bottom:18px;line-height:1.5;
}
.customer-price-row{
  text-align:center;font-size:15px;color:var(--choc);margin:18px 0 14px;
  padding:12px;background:var(--cream);border-radius:10px;
}
.customer-footer{display:flex;justify-content:center;margin-top:18px;}
.payment-reminder-modal{max-width:380px;text-align:center;}
.payment-reminder-modal h2{margin-bottom:14px;font-family:'Inter',sans-serif;font-weight:700;}
.payment-reminder-text{font-size:14px;line-height:1.6;margin:0 0 14px;color:var(--choc);}
.admin-link-btn{
  background:none;border:none;color:var(--choc-soft);font-size:12px;
  text-decoration:underline;cursor:pointer;padding:4px;
}
.login-card{max-width:360px;margin:0 auto;}

@media (max-width:480px){
  #app{padding:20px 14px 40px;}
  .customer-logo{width:130px;height:130px;}
  .customer-form-card{padding:22px 16px;}
  .customer-title{font-size:21px;}
  .row2{grid-template-columns:1fr;}
  .row3{grid-template-columns:1fr;}
}
@media (min-width:481px) and (max-width:820px){
  .customer-logo{width:170px;height:170px;}
}
.login-error{
  background:#F3D3DE;color:var(--berry-deep);border-radius:8px;padding:9px 12px;
  font-size:13px;margin:4px 0 14px;
}
</style>

  window.storage = {
    async get(key, shared){
      const snap = await fsDb.collection(FS_COLLECTION).doc(key).get();
      if(!snap.exists) return null;
      const data = snap.data();
      return { key, value: data.value, shared: !!shared };
    },
    async set(key, value, shared){
      await fsDb.collection(FS_COLLECTION).doc(key).set({ value, updatedAt: Date.now() });
      return { key, value, shared: !!shared };
    },
    async delete(key, shared){
      await fsDb.collection(FS_COLLECTION).doc(key).delete();
      return { key, deleted:true, shared: !!shared };
    },
    async list(prefix, shared){
      const snap = await fsDb.collection(FS_COLLECTION).get();
      const keys = [];
      snap.forEach(d=>{ if(!prefix || d.id.startsWith(prefix)) keys.push(d.id); });
      return { keys, prefix, shared: !!shared };
    }
  };

  // ---------- migration (keeps old saved orders working with the new shape) ----------
  function migrateCakeArr(arr, legacyQty){
    const src = (arr && arr.length) ? arr : (legacyQty ? Array.from({length:legacyQty}, ()=>({})) : []);
    return src.map(unit=>{
      let combos = [];
      if(unit.combos && unit.combos.length) combos = unit.combos.filter(c=>c.flavor||c.color).map(c=>({flavor:c.flavor||'', color:c.color||''}));
      else if(unit.flavor || unit.color) combos = [{flavor:unit.flavor||'', color:unit.color||''}];
      let decorIds = [];
      if(Array.isArray(unit.decorIds)) decorIds = unit.decorIds.slice();
      else if(unit.decorId) decorIds = [unit.decorId];
      return {combos, draftFlavor:'', draftColor:'', decorEnabled: !!unit.decorEnabled, decorIds};
    });
  }
  function migrateOrder(o){
    o = Object.assign({}, o);
    const statusMap = {
      naujas:'aktyvus', patvirtintas:'aktyvus', gaminamas:'aktyvus',
      paruostas:'pagaminta', atiduotas:'ivykdyta', atsauktas:'ivykdyta'
    };
    if(statusMap[o.status]) o.status = statusMap[o.status];
    if(!STATUS_ORDER.includes(o.status)) o.status = 'aktyvus';

    o.largeCakes = migrateCakeArr(o.largeCakes, o.qtyLarge);
    o.smallCakes = migrateCakeArr(o.smallCakes, o.qtySmall);

    o.jarQtyLarge = (o.jarQtyLarge!==undefined) ? o.jarQtyLarge : (o.jarQty!==undefined ? o.jarQty : (o.qtyJars || 0));
    o.jarQtySmall = (o.jarQtySmall!==undefined) ? o.jarQtySmall : 0;
    o.jarLargeCombos = (o.jarLargeCombos && o.jarLargeCombos.length)
      ? o.jarLargeCombos.filter(c=>c.flavor||c.color).map(c=>({flavor:c.flavor||'', color:c.color||''}))
      : [];
    o.jarSmallCombos = (o.jarSmallCombos && o.jarSmallCombos.length)
      ? o.jarSmallCombos.filter(c=>c.flavor||c.color).map(c=>({flavor:c.flavor||'', color:c.color||''}))
      : [];
    delete o.jarGroups; delete o.jarQty; delete o.jarSize; delete o.jarCombos;
    delete o.jarDraftFlavor; delete o.jarDraftColor;
    delete o.jarLargeDraftQty; delete o.jarSmallDraftQty;
    o.jarLargeDraftFlavor=''; o.jarLargeDraftColor='';
    o.jarSmallDraftFlavor=''; o.jarSmallDraftColor='';

    if(o.jarLargeExtras && Array.isArray(o.jarLargeExtras.selectedIds)){
      o.jarLargeExtras = {enabled: !!o.jarLargeExtras.enabled, selectedIds: o.jarLargeExtras.selectedIds.slice()};
    } else if(o.jarExtras && Array.isArray(o.jarExtras.selectedIds)){
      // carry the old shared selection over to both sizes as a starting point
      o.jarLargeExtras = {enabled: !!o.jarExtras.enabled, selectedIds: o.jarExtras.selectedIds.slice()};
    } else {
      o.jarLargeExtras = {enabled: false, selectedIds: []};
    }
    if(o.jarSmallExtras && Array.isArray(o.jarSmallExtras.selectedIds)){
      o.jarSmallExtras = {enabled: !!o.jarSmallExtras.enabled, selectedIds: o.jarSmallExtras.selectedIds.slice()};
    } else if(o.jarExtras && Array.isArray(o.jarExtras.selectedIds)){
      o.jarSmallExtras = {enabled: !!o.jarExtras.enabled, selectedIds: o.jarExtras.selectedIds.slice()};
    } else {
      o.jarSmallExtras = {enabled: false, selectedIds: []};
    }
    delete o.jarExtras;

    o.customerPhone = o.customerPhone || '';
    o.priceManual = (o.priceManual !== undefined) ? o.priceManual : !!o.price;
    o.paid = !!o.paid;
    o.stockDeducted = !!o.stockDeducted;
    return o;
  }

  async function loadOrders(){
    try{
      const res = await window.storage.get('orders', true);
      const parsed = res && res.value ? JSON.parse(res.value) : [];
      orders = parsed.map(migrateOrder);
    }catch(e){
      orders = [];
    }
    try{
      const wres = await window.storage.get('warehouse', true);
      if(wres && wres.value){
        const p = JSON.parse(wres.value);
        const pkg = Object.assign({large:0,small:0,jarsLarge:0,jarsSmall:0}, p.packaging||{});
        if(pkg.jars !== undefined){
          // migrate the old single "jars" count into the large-jars bucket
          pkg.jarsLarge = (pkg.jarsLarge||0) + pkg.jars;
          delete pkg.jars;
        }
        warehouse = {
          flavors: p.flavors || [],
          colors: p.colors || [],
          packaging: pkg
        };
      }
    }catch(e){}
    try{
      const pres = await window.storage.get('prices', true);
      if(pres && pres.value){
        prices = Object.assign({large_cake:0,small_cake:0,large_jar:0,small_jar:0,delivery_vilnius:0,delivery_bus:0}, JSON.parse(pres.value));
        delete prices.extras;
      }
    }catch(e){}
    try{
      const eres = await window.storage.get('extras', true);
      const parsed = (eres && eres.value) ? JSON.parse(eres.value) : [];

        delete orderSettings.maxJar;

    }catch(e){}
    try{

      vacations = (vres && vres.value) ? JSON.parse(vres.value) : [];

  async function storageSetWithRetry(key, value, attempts){
    attempts = attempts || 3;
    let lastErr;
    for(let i=0; i<attempts; i++){
      try{ await window.storage.set(key, value, true); return; }
      catch(e){ lastErr = e; if(i < attempts-1){ await new Promise(r=>setTimeout(r, 400*(i+1))); } }
    }
    throw lastErr;
  }
  async function saveOrders(){ try{ await storageSetWithRetry('orders', JSON.stringify(orders)); }catch(e){ console.error('Nepavyko išsaugoti užsakymų', e); } }
  async function saveWarehouse(){ try{ await storageSetWithRetry('warehouse', JSON.stringify(warehouse)); }catch(e){ console.error('Nepavyko išsaugoti sandėlio', e); } }

  // ---------- parsing ----------
  const MONTHS = {
    'sausio':1,'vasario':2,'kovo':3,'balandžio':4,'balandzio':4,'gegužės':5,'geguzes':5,
    'birželio':6,'birzelio':6,'liepos':7,'rugpjūčio':8,'rugpjucio':8,'rugsėjo':9,'rugsejo':9,
    'spalio':10,'lapkričio':11,'lapkricio':11,'gruodžio':12,'gruodzio':12
  };
  const COLOR_ROOTS = ['rožin','rozin','balt','mėlyn','melyn','žal','zal','gelton',
    'raudon','violetin','auksin','sidabrin','juod','rud','pastelin','oranžin','oranzin',
    'rusv','alyv','turkio','purpurin','bordo','krem','perlamutrin'];
  const FILLER_WORDS = /\b(sveiki|laba diena|labas|reikia|reikėtų|reiketu|norėčiau|noreciau|norėtume|noretume|užsisakyti|uzsisakyti|užsakyti|uzsakyti|prašau|prasau|ačiū|aciu|tortas|tortą|torta|torto|tortui|man|norim|reik|galėtumėt|galetumet|galit|galėtumėte|prašyčiau|prasyciau|šiaip|siaip|labai|noriu|prašyt|spalvos|spalva|spalvų|spalvu|skonio|skoniai|skonis|skonių|skoniu|d\.)\b/g;
  const STOP_WORDS = ['pati','pats','pačiam','pacia','pačiai','asmeniškai','asmeniskai','viena','vienas','namo'];

  function classifyToken(tok){
    if(!tok) return null;
    tok = tok.trim();
    if(tok.length < 3) return null;
    if(/^\d+([.,]\d+)?$/.test(tok)) return null;
    if(/€|eur\b/.test(tok)) return null;
    if(/autobus|siunt|pristat|atvež|atvez|atsiim|pasiim|vilniu/.test(tok)) return null;
    if(STOP_WORDS.includes(tok)) return null;
    for(const root of COLOR_ROOTS){ if(tok.includes(root)) return {type:'color', value:tok}; }
    if(/^didel/.test(tok)) return {type:'size', value:'didelis'};
    if(/^maž|^maz/.test(tok)) return {type:'size', value:'mazas'};
    return {type:'flavor', value:tok};
  }

  function parseMessage(text){
    const t = text.toLowerCase();
    const result = { neededDate:'', flavor:'', colors:'', fulfillment:'', address:'', price:'', customerPhone:'' };
    let workingText = t;

    let m = t.match(/\b(\d{1,2})[.\-\/](\d{1,2})(?:[.\-\/](\d{2,4}))?\b/);
    if(m){
      const day = parseInt(m[1],10), mon = parseInt(m[2],10);
      let year = m[3] ? parseInt(m[3],10) : new Date().getFullYear();
      if(year < 100) year += 2000;
      if(day>=1&&day<=31&&mon>=1&&mon<=12){
        result.neededDate = `${year}-${String(mon).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        workingText = workingText.replace(m[0], ' ');
      }
    }
    if(!result.neededDate){
      for(const [name,num] of Object.entries(MONTHS)){
        const re1 = new RegExp('(\\d{1,2})\\s*'+name+'[a-zė]*');
        const re2 = new RegExp(name+'[a-zė]*\\s*(\\d{1,2})');
        let mm = t.match(re1) || t.match(re2);
        if(mm){
          const day = parseInt(mm[1],10);
          let year = new Date().getFullYear();
          result.neededDate = `${year}-${String(num).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
          workingText = workingText.replace(mm[0], ' ');
          break;
        }
      }
    }

    if(/autobus|siunt/.test(t)) result.fulfillment = 'autobusas';
    else if(/pristat|atvež|atvez/.test(t)) result.fulfillment = 'pristatymas';
    else if(/atsiim|pasiim/.test(t)) result.fulfillment = 'atsiemimas';

    let pm = t.match(/(\d+(?:[.,]\d{1,2})?)\s?(€|eur)/);
    if(pm){ result.price = pm[1].replace(',','.'); workingText = workingText.replace(pm[0], ' '); }

    let phoneMatch = workingText.match(/(\+370[\s\-]?\d{3}[\s\-]?\d{5}|\b8\d{8}\b|\b0?6\d{7}\b)/);
    if(phoneMatch){
      result.customerPhone = phoneMatch[0].replace(/[\s\-]/g,'');
      workingText = workingText.replace(phoneMatch[0], ' ');
    }

    workingText = workingText.replace(FILLER_WORDS, ' ');
    const segments = workingText.split(/[,;\n]/);
    const flavors = [];
    const colors = [];
    segments.forEach(seg=>{
      seg.split(/\s+ir\s+|\s+bei\s+/).forEach(rawTok=>{
        const cls = classifyToken(rawTok);
        if(!cls) return;
        if(cls.type==='color' && !colors.includes(cls.value)) colors.push(cls.value);
        else if(cls.type==='flavor' && !flavors.includes(cls.value)) flavors.push(cls.value);
      });
    });
    result.flavor = flavors.join(', ');
    result.colors = colors.join(', ');
    return result;
  }

  // ---------- price calc ----------
  function extrasSumForSize(extrasState, size, jarQty){
    if(!extrasState || !extrasState.enabled || !extrasState.selectedIds || !extrasState.selectedIds.length) return 0;
    const priceKey = size==='large' ? 'priceLarge' : 'priceSmall';
    const perJar = extrasState.selectedIds.reduce((sum,id)=>{
      const ex = extrasList.find(e=>e.id===id);
      return sum + (ex ? (ex[priceKey]||0) : 0);
    }, 0);
    return perJar * (jarQty||0);
  }
  function extrasSumFor(o){
    return extrasSumForSize(o.jarLargeExtras, 'large', o.jarQtyLarge) + extrasSumForSize(o.jarSmallExtras, 'small', o.jarQtySmall);
  }
  function deliveryPriceFor(fulfillment){
    if(fulfillment==='pristatymas') return prices.delivery_vilnius||0;
    if(fulfillment==='autobusas') return prices.delivery_bus||0;
    return 0;
  }
  function fulfillmentLabel(fulfillment){
    if(fulfillment==='atsiemimas') return 'Atsiimsiu pats (Vilnius, Viršilų g. 11)';
    if(fulfillment==='pristatymas') return 'Pristatymas Vilniuje';
    if(fulfillment==='autobusas') return 'Siuntimas autobusu';
    return null;
  }
  function decorSumFor(o){
    let sum = 0;
    [].concat(o.largeCakes||[], o.smallCakes||[]).forEach(unit=>{
      if(unit.decorEnabled && unit.decorIds && unit.decorIds.length){
        unit.decorIds.forEach(id=>{
          const d = decorsList.find(x=>x.id===id);
          if(d) sum += (d.price||0);
        });
      }
    });
    return sum;
  }
  function computeOrderPrice(o){
    const lc = (o.largeCakes||[]).length;
    const sc = (o.smallCakes||[]).length;
    const jl = o.jarQtyLarge || 0;
    const js = o.jarQtySmall || 0;
    const jarCost = jl*(prices.large_jar||0) + js*(prices.small_jar||0);
    let total = lc*(prices.large_cake||0) + sc*(prices.small_cake||0) + jarCost;
    total += extrasSumFor(o);
    total += decorSumFor(o);
    total += deliveryPriceFor(o.fulfillment);
    return Math.round(total*100)/100;
  }
  function recomputePrice(){
    if(!modalOrder || modalOrder.priceManual) return;
    const total = computeOrderPrice(modalOrder);
    modalOrder.price = total ? String(total) : '';
  }

  // ---------- color helper ----------
  function colorNameToHex(name){
    const n = (name||'').toLowerCase();
    const map = [
      [/rožin|rozin/, '#F2A6C6'], [/raudon/, '#C0392B'], [/balt/, '#FFFFFF'],
      [/mėlyn|melyn/, '#3B6FC4'], [/žal|zal/, '#5B8C3A'], [/gelton/, '#EFC94C'],
      [/violetin/, '#8E5FBF'], [/auksin/, '#C9932E'], [/sidabrin/, '#B9BEC4'],
      [/juod/, '#2B2320'], [/rud/, '#7A5230'], [/pastelin/, '#F4E3E8'],
      [/oranžin|oranzin/, '#E8823A'], [/rusv/, '#8A6E4B'], [/alyv/, '#7C8F5A'],
      [/turkio/, '#3FB6A8'], [/purpurin/, '#9B2D6E'], [/bordo/, '#6E1F32'],
      [/krem/, '#F6E9D3'], [/perlamutrin/, '#EDEDF2'],
    ];
    for(const [re,hex] of map){ if(re.test(n)) return hex; }
    let hash=0; for(let i=0;i<n.length;i++) hash = n.charCodeAt(i) + ((hash<<5)-hash);
    return `hsl(${Math.abs(hash)%360},55%,65%)`;
  }

  function calendarView(){
    const first = new Date(calYear, calMonth, 1);
    const startOffset = (first.getDay() + 6) % 7;
    const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
    const todayStr = fmtISO(new Date());

    const byDate = {};
    orders.forEach(o=>{
      if(!o.neededDate) return;
      (byDate[o.neededDate] = byDate[o.neededDate] || []).push(o);
    });

    let cells = '';
    for(let i=0;i<startOffset;i++) cells += `<div class="cal-day empty"></div>`;
    for(let d=1; d<=daysInMonth; d++){
      const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dayOrders = byDate[dateStr] || [];
      const dots = dayOrders.slice(0,3).map(o=>`<span class="cal-dot ${o.status}"></span>`).join('');
      const more = dayOrders.length>3 ? `<span class="cal-more">+${dayOrders.length-3}</span>` : '';
      const onVacation = !!vacationRangeFor(dateStr);
      cells += `<div class="cal-day ${dateStr===todayStr?'today':''} ${dateStr===selectedDate?'selected':''} ${onVacation?'cal-day-vacation':''}" data-date="${dateStr}">
        <span class="cal-daynum">${d}</span>
        <div class="cal-dots">${dots}${more}</div>
      </div>`;
    }

    const selectedOrders = selectedDate ? (byDate[selectedDate]||[]) : [];

    return `
      <div class="cal-shrink">
        <div class="cal-head">
          <h3>${capitalizeFirst(MONTH_NAMES[calMonth])} ${calYear}</h3>

        </div>

  function fmtISO(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
  function dateFromISO(iso){ const [y,m,d] = iso.split('-').map(Number); return new Date(y, m-1, d); }
  function addDaysISO(iso, days){ const d = dateFromISO(iso); d.setDate(d.getDate()+days); return fmtISO(d); }
  function vacationRangeFor(iso){
    if(!iso) return null;
    return vacations.find(v => iso >= v.start && iso <= v.end) || null;
  }
  function suggestedDatesFor(range){
    return { before: addDaysISO(range.start, -1), after: addDaysISO(range.end, 1) };
  }
  function capitalizeFirst(s){ return s ? s.charAt(0).toUpperCase() + s.slice(1) : s; }

    return `<div class="wh-section">

        <div class="wh-head-left" id="whToggle">
          <h2 class="section-title">Sandėlys</h2>
          <svg class="wh-chevron ${warehouseExpanded?'open':''}" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>

      ${warehouseExpanded ? `

  function plainTextOrderSummary(data){
    const lines = [];
    if(data.largeCakes && data.largeCakes.length){
      lines.push(`Dideli tortai (${data.largeCakes.length} vnt.):`);
      data.largeCakes.forEach((unit,i)=>{
        const combos = (unit.combos||[]).filter(c=>c.flavor||c.color);
        const txt = combos.length ? combos.map(c=>`${c.color||'?'} - ${c.flavor||'?'}`).join(' | ') : 'nepasirinkta';
        lines.push(`  #${i+1}: ${txt}`);
        const decorLabel = decorLabelFor(unit);
        if(decorLabel) lines.push(`    ${decorLabel}`);
      });
    }
    if(data.smallCakes && data.smallCakes.length){
      lines.push(`Maži tortai (${data.smallCakes.length} vnt.):`);
      data.smallCakes.forEach((unit,i)=>{
        const combos = (unit.combos||[]).filter(c=>c.flavor||c.color);
        const txt = combos.length ? combos.map(c=>`${c.color||'?'} - ${c.flavor||'?'}`).join(' | ') : 'nepasirinkta';
        lines.push(`  #${i+1}: ${txt}`);
        const decorLabel2 = decorLabelFor(unit);
        if(decorLabel2) lines.push(`    ${decorLabel2}`);
      });
    }
    if(data.jarQtyLarge){
      const combos = (data.jarLargeCombos||[]).filter(c=>c.flavor||c.color);
      lines.push(`Dideli indeliai (${data.jarQtyLarge} vnt.): ` + (combos.length ? combos.map(c=>`${c.color||'?'} - ${c.flavor||'?'}`).join(', ') : 'skoniai nenurodyti'));
      const extrasLine = formatExtrasLineFor(data.jarLargeExtras, 'Didelių');
      if(extrasLine) lines.push(`  ${extrasLine}`);
    }
    if(data.jarQtySmall){
      const combos = (data.jarSmallCombos||[]).filter(c=>c.flavor||c.color);
      lines.push(`Maži indeliai (${data.jarQtySmall} vnt.): ` + (combos.length ? combos.map(c=>`${c.color||'?'} - ${c.flavor||'?'}`).join(', ') : 'skoniai nenurodyti'));
      const extrasLine2 = formatExtrasLineFor(data.jarSmallExtras, 'Mažų');
      if(extrasLine2) lines.push(`  ${extrasLine2}`);
    }
    return lines.length ? lines.join('\n') : '—';
  }

  function openAttachment(dataUrl){
    try{
      const [header, b64] = dataUrl.split(',');
      const mimeMatch = header.match(/data:(.*?);base64/);
      const mime = mimeMatch ? mimeMatch[1] : 'application/octet-stream';
      const binary = atob(b64);
      const bytes = new Uint8Array(binary.length);
      for(let i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
      const blob = new Blob([bytes], {type: mime});
      const blobUrl = URL.createObjectURL(blob);
      window.open(blobUrl, '_blank');
      setTimeout(()=>URL.revokeObjectURL(blobUrl), 60000);
    }catch(e){
      console.error('Nepavyko atidaryti priedo', e);
      alert('Nepavyko atidaryti prisegto failo.');
    }
  }

  function readFileCompressed(file){
    return new Promise((resolve, reject)=>{
      if(file.type.startsWith('image/')){
        const reader = new FileReader();
        reader.onload = (e)=>{
          const img = new Image();
          img.onload = ()=>{
            const maxDim = 1000;
            let w = img.width, h = img.height;
            if(w > maxDim || h > maxDim){
              const scale = maxDim / Math.max(w,h);
              w = Math.round(w*scale); h = Math.round(h*scale);
            }
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL('image/jpeg', 0.72));
          };
          img.onerror = reject;
          img.src = e.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      } else {
        const reader = new FileReader();
        reader.onload = (e)=> resolve(e.target.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      }
    });
  }

  function computeFinancialReport(start, end){
    const incomeEntries = invoices.filter(inv=>inv.issueDate >= start && inv.issueDate <= end);
    const expenseEntries = expenses.filter(ex=>ex.date >= start && ex.date <= end);
    const totalIncome = incomeEntries.reduce((s,i)=>s+i.totalAmount, 0);
    const totalExpenses = expenseEntries.reduce((s,e)=>s+(e.amount||0), 0);
    const byCategory = {};
    expenseEntries.forEach(e=>{
      const cat = e.category || 'Be kategorijos';
      byCategory[cat] = (byCategory[cat]||0) + (e.amount||0);
    });
    return {
      start, end, incomeEntries, expenseEntries,
      totalIncome: Math.round(totalIncome*100)/100,
      totalExpenses: Math.round(totalExpenses*100)/100,
      netProfit: Math.round((totalIncome-totalExpenses)*100)/100,
      byCategory: Object.entries(byCategory).map(([name,amount])=>({name, amount: Math.round(amount*100)/100})),
    };
  }

  function decorLabelFor(unit){

    const names = unit.decorIds.map(id=>{
      const d = decorsList.find(x=>x.id===id);

  function formatUnitsBlock(arr, singular, plural, noun){
    if(!arr || !arr.length) return '';
    const n = arr.length;
    const headerText = n===1 ? `${singular} - 1 vnt.` : `${plural} - ${n} vnt.`;
    let html = `<div class="ticket-meta"><b>${escapeHtml(headerText)}</b></div>`;
    if(n===1){
      const combos = (arr[0].combos||[]).filter(c=>c.flavor||c.color);
      const txt = combos.length
        ? combos.map(c=>`${escapeHtml(c.color||'?')} - ${escapeHtml(c.flavor||'?')}`).join(' | ')
        : 'nepasirinkta';
      html += `<div class="ticket-meta ticket-unit-line">${txt}</div>`;
      const decorLabel = decorLabelFor(arr[0]);
      if(decorLabel) html += `<div class="ticket-meta ticket-unit-line">${escapeHtml(decorLabel)}</div>`;
    } else {
      arr.forEach((unit,i)=>{
        const combos = (unit.combos||[]).filter(c=>c.flavor||c.color);
        const txt = combos.length
          ? combos.map(c=>`${escapeHtml(c.color||'?')} - ${escapeHtml(c.flavor||'?')}`).join(' | ')
          : 'nepasirinkta';
        html += `<div class="ticket-meta ticket-ordinal">${ORDINALS[i]||('#'+(i+1))} ${noun}</div>`;
        html += `<div class="ticket-meta ticket-unit-line">${txt}</div>`;
        const decorLabel = decorLabelFor(unit);
        if(decorLabel) html += `<div class="ticket-meta ticket-unit-line">${escapeHtml(decorLabel)}</div>`;
      });
    }
    return html;
  }
  function formatJarSizeBlock(qty, combos, singular, plural){
    if(!qty) return '';
    const headerText = qty===1 ? `${singular} - 1 vnt.` : `${plural} - ${qty} vnt.`;
    let html = `<div class="ticket-meta"><b>${escapeHtml(headerText)}</b></div>`;
    const filtered = (combos||[]).filter(c=>c.flavor||c.color);
    if(filtered.length){
      html += `<div class="ticket-meta ticket-unit-line">${filtered.map(c=>`${escapeHtml(c.color||'?')} - ${escapeHtml(c.flavor||'?')}`).join(', ')}</div>`;
    }
    return html;
  }
  function formatExtrasLineFor(extrasState, label){
    if(!extrasState || !extrasState.enabled || !extrasState.selectedIds || !extrasState.selectedIds.length) return '';
    const names = extrasState.selectedIds.map(id=>{
      const ex = extrasList.find(e=>e.id===id);
      return ex ? ex.name : null;
    }).filter(Boolean);
    if(!names.length) return '';
    return `${label} priedai: ${names.join(', ')}`;
  }

  function ticketCard(o){
    const dateStr = o.neededDate ? formatDate(o.neededDate) : 'Data nenurodyta';
    const largeBlock = formatUnitsBlock(o.largeCakes, 'Didelis tortas', 'Dideli tortai', 'tortas');
    const smallBlock = formatUnitsBlock(o.smallCakes, 'Mažas tortas', 'Maži tortai', 'tortas');
    const jarLargeBlock = formatJarSizeBlock(o.jarQtyLarge, o.jarLargeCombos, 'Didelis indelis', 'Dideli indeliai');
    const jarSmallBlock = formatJarSizeBlock(o.jarQtySmall, o.jarSmallCombos, 'Mažas indelis', 'Maži indeliai');

    const qtyBadges = [];
    if(o.largeCakes && o.largeCakes.length) qtyBadges.push(`<span class="qty-badge">${iconLargeCake()}${o.largeCakes.length}</span>`);
    if(o.smallCakes && o.smallCakes.length) qtyBadges.push(`<span class="qty-badge">${iconSmallCake()}${o.smallCakes.length}</span>`);
    if(o.jarQtyLarge) qtyBadges.push(`<span class="qty-badge">${iconLargeJar()}${o.jarQtyLarge}</span>`);
    if(o.jarQtySmall) qtyBadges.push(`<span class="qty-badge">${iconSmallJar()}${o.jarQtySmall}</span>`);

    const jarLargeExtrasLine = formatExtrasLineFor(o.jarLargeExtras,'Didelių');
    const jarSmallExtrasLine = formatExtrasLineFor(o.jarSmallExtras,'Mažų');
    const metaGroups = [];
    if(largeBlock) metaGroups.push(largeBlock);
    if(smallBlock) metaGroups.push(smallBlock);
    if(jarLargeBlock || jarLargeExtrasLine){
      metaGroups.push(
        jarLargeBlock +
        (jarLargeExtrasLine ? `<div class="ticket-meta">${jarLargeExtrasLine}</div>` : '')
      );
    }
    if(jarSmallBlock || jarSmallExtrasLine){
      metaGroups.push(
        jarSmallBlock +
        (jarSmallExtrasLine ? `<div class="ticket-meta">${jarSmallExtrasLine}</div>` : '')
      );
    }
    metaGroups.push(`<div class="ticket-meta">${fulfillmentLabel(o.fulfillment) || 'Būdas nenurodytas'}</div>`);

    return `<div class="ticket" data-id="${o.id}">
      <div class="ticket-top">
        <div class="ticket-name">${escapeHtml(o.customerName || 'Be vardo')}${o.orderNumber ? `<span class="ticket-ordernum">Nr. ${o.orderNumber}</span>` : ''}</div>
        <div class="stamp ${o.status}">${STATUS_LABELS[o.status]}</div>
      </div>
      <div class="ticket-meta ticket-date-line"><b>${dateStr}</b></div>
      ${metaGroups.join('<hr class="ticket-divider">')}
      ${qtyBadges.length ? `<hr class="ticket-divider"><div class="qty-row">${qtyBadges.join('')}</div>` : ''}
      <div class="perf"></div>
      <div class="ticket-bottom">
        <span class="paid-pill ${o.paid?'yes':'no'}">${o.paid ? 'Apmokėta' : 'Neapmokėta'}</span>
        <span class="ticket-bottom-right">
          ${o.customerPhone ? `<span class="phone-text">${iconPhone()}${escapeHtml(o.customerPhone)}</span>` : ''}
          <span class="price-text">${o.price ? o.price+' €' : ''}</span>
        </span>
      </div>
    </div>`;
  }

  function draftFlavorPicker(group, unitIdx, selected){
    if(!warehouse.flavors.length) return `<p class="combo-hint">Sandėlyje dar nėra įvestų skonių.</p>`;
    return `<div class="chip-picker" data-draft-flavor-pick data-group="${group}" data-unit="${unitIdx}">
      ${warehouse.flavors.map(f=>`<button type="button" class="pick-chip ${selected===f?'selected':''}" data-value="${escapeAttr(f)}">${escapeHtml(f)}</button>`).join('')}
    </div>`;
  }
  function draftColorPicker(group, unitIdx, selected){
    if(!warehouse.colors.length) return `<p class="combo-hint">Sandėlyje dar nėra įvestų spalvų.</p>`;
    return `<div class="color-bubbles" data-draft-color-pick data-group="${group}" data-unit="${unitIdx}">
      ${warehouse.colors.map(c=>`<button type="button" class="color-bubble ${selected===c?'selected':''}" style="background:${colorNameToHex(c)}" data-value="${escapeAttr(c)}" title="${escapeAttr(c)}"></button>`).join('')}
    </div>`;
  }
  function comboLine(c, extra, removeAttrs, idx, sizePrefix){
    return `<div class="combo-line">
      <span class="combo-line-label">Derinys ${idx+1}</span>
      <span class="combo-line-text">${sizePrefix?`${escapeHtml(sizePrefix)} · `:''}${escapeHtml(c.color||'?')} - ${escapeHtml(c.flavor||'?')}${extra?` ×${extra}`:''}</span>
      <button type="button" class="chip-x-mini" ${removeAttrs}>×</button>
    </div>`;
  }

  function cakeUnitBlock(cake, group, unitIdx, label){
    const combos = cake.combos || [];
    const max = group==='large' ? orderSettings.maxLarge : orderSettings.maxSmall;
    const maxReached = combos.length >= max;
    const decorChkId = `decorEnabled_${group}_${unitIdx}`;
    const decorIds = cake.decorIds || [];
    return `<div class="unit-block">
      <div class="unit-title">${label}</div>
      ${maxReached ? `<p class="combo-hint">Pasiektas maksimalus derinių skaičius (${max}).</p>` : `
      <div class="pick-label">Skonis</div>
      ${draftFlavorPicker(group, unitIdx, cake.draftFlavor)}
      <div class="pick-label">Spalva</div>
      ${draftColorPicker(group, unitIdx, cake.draftColor)}
      <p class="combo-hint">Pasirink skonį ir spalvą — derinys pridedamas automatiškai.</p>
      `}
      <div class="combo-list">
        ${combos.length
          ? combos.map((c,i)=>comboLine(c, null, `data-remove-combo data-group="${group}" data-unit="${unitIdx}" data-combo="${i}"`, i)).join('')
          : `<p class="combo-hint">Dar nepridėta jokio derinio.</p>`}
      </div>
      <div class="checkrow" style="margin-top:10px;">
        <input type="checkbox" id="${decorChkId}" data-decor-enable data-group="${group}" data-unit="${unitIdx}" ${cake.decorEnabled?'checked':''}>
        <label for="${decorChkId}" style="margin:0;text-transform:none;font-weight:500;">Reikia dekoro</label>
      </div>
      ${cake.decorEnabled ? `<div class="extras-picker">
        ${decorsList.length ? decorsList.map(d=>`
          <label class="extras-check-row">
            <input type="checkbox" data-decor-pick="${d.id}" data-decor-pick-group="${group}" data-decor-pick-unit="${unitIdx}" ${decorIds.includes(d.id)?'checked':''}>
            <span>${escapeHtml(d.name)}</span>
            <span class="extras-price">+${(d.price||0).toFixed(2)} €</span>
          </label>`).join('') : `<p class="combo-hint">Kainų skiltyje dar nėra pridėtų dekoro variantų.</p>`}
      </div>` : ''}
    </div>`;
  }

  function jarSizeBlock(o, size){
    const qty = size==='large' ? (o.jarQtyLarge||0) : (o.jarQtySmall||0);
    if(!qty) return '';
    const combos = size==='large' ? (o.jarLargeCombos||[]) : (o.jarSmallCombos||[]);
    const draftFlavor = size==='large' ? o.jarLargeDraftFlavor : o.jarSmallDraftFlavor;
    const draftColor = size==='large' ? o.jarLargeDraftColor : o.jarSmallDraftColor;
    const maxCombos = size==='large' ? orderSettings.maxJarLarge : orderSettings.maxJarSmall;
    const capReached = combos.length >= maxCombos;
    const label = size==='large' ? 'Dideli' : 'Maži';
    const groupKey = size==='large' ? 'jarLarge' : 'jarSmall';

    const stateKey = size==='large' ? 'jarLargeExtras' : 'jarSmallExtras';
    const priceKey = size==='large' ? 'priceLarge' : 'priceSmall';
    const chkId = size==='large' ? 'f_jar_large_extras_enabled' : 'f_jar_small_extras_enabled';
    const extrasState = o[stateKey] || {enabled:false, selectedIds:[]};

    return `<div class="unit-block">
      <div class="unit-title">${label} indeliai — ${qty} vnt</div>
      ${capReached ? `<p class="combo-hint">Pasiektas maksimalus derinių skaičius (${maxCombos}).</p>` : `
      <div class="pick-label">Skonis</div>
      ${draftFlavorPicker(groupKey, 0, draftFlavor)}
      <div class="pick-label">Spalva</div>
      ${draftColorPicker(groupKey, 0, draftColor)}
      <p class="combo-hint">Pasirink skonį ir spalvą — derinys pridedamas automatiškai.</p>
      `}
      <div class="combo-list">
        ${combos.length
          ? combos.map((c,i)=>comboLine(c, null, `data-remove-jar-combo data-size="${size}" data-combo="${i}"`, i)).join('')
          : `<p class="combo-hint">Dar nepridėta jokio derinio.</p>`}
      </div>
      <div class="checkrow" style="margin-top:10px;"><input type="checkbox" id="${chkId}" data-jar-extras-size="${size}" ${extrasState.enabled?'checked':''}><label for="${chkId}" style="margin:0;text-transform:none;font-weight:500;">Reikalingi priedai</label></div>
      ${extrasState.enabled ? `<div class="extras-picker">
        ${extrasList.length ? extrasList.map(ex=>`
          <label class="extras-check-row">
            <input type="checkbox" data-extra-pick="${ex.id}" data-extra-pick-size="${size}" ${extrasState.selectedIds.includes(ex.id)?'checked':''}>
            <span>${escapeHtml(ex.name)}</span>
            <span class="extras-price">+${(ex[priceKey]||0).toFixed(2)} €/indeliui</span>
          </label>`).join('') : `<p class="combo-hint">Kainų skiltyje dar nėra pridėtų priedų.</p>`}
      </div>` : ''}
    </div>`;
  }

        <div class="field">
          <label>Užsakomi produktai</label>
          <div class="row2" style="margin-top:8px;">

              <label>Didelių tortų kiekis</label>

    </div>`;
  }

  function attachEvents(prevId, prevCaret){
    const loginBtn = document.getElementById('loginBtn');
    if(loginBtn){
      const doLogin = async ()=>{
        const u = (document.getElementById('loginUser').value||'').trim();
        const p = (document.getElementById('loginPass').value||'');
        if(!u || !p){
          loginError = 'Įrašyk slapyvardį ir slaptažodį.';
          render();
          return;
        }
        loginBtn.disabled = true;
        loginBtn.textContent = 'Jungiamasi…';
        const loginEmail = u.includes('@') ? u.toLowerCase() : `${u.toLowerCase()}@${ADMIN_EMAIL_DOMAIN}`;
        try{
          await fbAuth.signInWithEmailAndPassword(loginEmail, p);
          loginError = '';
          // screenMode flips to 'admin' via the onAuthStateChanged listener; render() there
        }catch(e){
          console.error('Prisijungimo klaida:', e.code, e.message);
          if(e.code === 'auth/unauthorized-domain'){
            loginError = 'Šis puslapio adresas neįtrauktas į Firebase leidžiamų domenų sąrašą (Authentication → Settings → Authorized domains).';
          } else if(e.code === 'auth/user-not-found' || e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential'){
            loginError = 'Neteisingas slapyvardis arba slaptažodis.';
          } else if(e.code === 'auth/invalid-email'){
            loginError = 'Neteisingas el. pašto/slapyvardžio formatas.';
          } else if(e.code === 'auth/operation-not-allowed'){
            loginError = 'El. pašto/slaptažodžio prisijungimas neįjungtas Firebase konsolėje (Authentication → Sign-in method).';
          } else {
            loginError = 'Prisijungimo klaida: ' + (e.code || e.message || 'nežinoma klaida');
          }
          render();
        }
      };
      loginBtn.onclick = doLogin;
      const passField = document.getElementById('loginPass');
      if(passField) passField.onkeydown = (e)=>{ if(e.key==='Enter') doLogin(); };
      const userField = document.getElementById('loginUser');
      if(userField) userField.onkeydown = (e)=>{ if(e.key==='Enter') doLogin(); };
    }
    const logoutBtn = document.getElementById('logoutBtn');
    if(logoutBtn) logoutBtn.onclick = async ()=>{
      try{ await fbAuth.signOut(); }catch(e){}
      screenMode = 'login';
      render();
    };
    const backToAdminBtn = document.getElementById('backToAdminBtn');
    if(backToAdminBtn) backToAdminBtn.onclick = ()=>{
      screenMode = fbAuth.currentUser ? 'admin' : 'login';
      modalOrder = null;
      render();
    };
    const saveFormUrlBtn = document.getElementById('saveFormUrlBtn');
    if(saveFormUrlBtn) saveFormUrlBtn.onclick = async ()=>{
      const el = document.getElementById('setFormUrl');
      orderSettings.formUrl = (el.value||'').trim();
      await saveOrderSettings();
      const original = saveFormUrlBtn.textContent;
      saveFormUrlBtn.textContent = 'Išsaugota ✓';
      setTimeout(()=>{ saveFormUrlBtn.textContent = original; }, 1500);
    };
    const addNotifyEmailBtn = document.getElementById('addNotifyEmailBtn');
    if(addNotifyEmailBtn) addNotifyEmailBtn.onclick = async ()=>{
      const el = document.getElementById('setNotifyEmail');
      const email = (el.value||'').trim();
      if(!email) return;
      if(!orderSettings.notifyEmails) orderSettings.notifyEmails = [];
      if(!orderSettings.notifyEmails.includes(email)) orderSettings.notifyEmails.push(email);
      await saveOrderSettings();
      render();
    };
    document.querySelectorAll('[data-notify-email-remove]').forEach(btn=>{
      btn.onclick = async ()=>{
        const email = btn.dataset.notifyEmailRemove;
        orderSettings.notifyEmails = (orderSettings.notifyEmails||[]).filter(e=>e!==email);
        await saveOrderSettings();
        render();
      };
    });
    const saveInfoTextsBtn = document.getElementById('saveInfoTextsBtn');
    if(saveInfoTextsBtn) saveInfoTextsBtn.onclick = async ()=>{
      orderSettings.infoLargeCake = (document.getElementById('setInfoLargeCake').value||'').trim();
      orderSettings.infoSmallCake = (document.getElementById('setInfoSmallCake').value||'').trim();
      orderSettings.infoLargeJar = (document.getElementById('setInfoLargeJar').value||'').trim();
      orderSettings.infoSmallJar = (document.getElementById('setInfoSmallJar').value||'').trim();
      await saveOrderSettings();
      const original = saveInfoTextsBtn.textContent;
      saveInfoTextsBtn.textContent = 'Išsaugota ✓';
      setTimeout(()=>{ saveInfoTextsBtn.textContent = original; }, 1500);
    };
    const copyFormUrlBtn = document.getElementById('copyFormUrlBtn');
    if(copyFormUrlBtn) copyFormUrlBtn.onclick = async (e)=>{
      const url = orderSettings.formUrl || '';
      if(!url){
        copyFormUrlBtn.textContent = 'Adresas dar neįvestas';
        setTimeout(()=>{ copyFormUrlBtn.textContent = 'Nukopijuoti užsakymo formos adresą'; }, 1800);
        return;
      }
      let copied = false;
      try{ await navigator.clipboard.writeText(url); copied = true; }
      catch(err){
        try{
          const ta = document.createElement('textarea');
          ta.value = url; ta.style.position='fixed'; ta.style.opacity='0';
          document.body.appendChild(ta); ta.focus(); ta.select();
          document.execCommand('copy'); document.body.removeChild(ta);
          copied = true;
        }catch(err2){ copied = false; }
      }
      const original = copyFormUrlBtn.textContent;
      copyFormUrlBtn.textContent = copied ? 'Nukopijuota ✓' : 'Nepavyko nukopijuoti';
      setTimeout(()=>{ copyFormUrlBtn.textContent = original; }, 1800);
    };
    const openCustomerFormBtn = document.getElementById('openCustomerFormBtn');

        const f = document.getElementById('invBuyerName');

        return;

      issueInvoiceBtn.disabled = true;

      const invoice = {
        id: uid(),
        invoiceNumber: nextInvoiceNumber(),
        issueDate: fmtISO(new Date()),

        orderNumber: modalOrder.orderNumber || null,

        buyerCode: (modalOrder.invBuyerCode||'').trim(),
        buyerVat: (modalOrder.invBuyerVat||'').trim(),
        buyerAddress: (modalOrder.invBuyerAddress||'').trim(),

      };
      invoices.push(invoice);
      await saveInvoices();
      render();

    const downloadInvoiceBtn = document.getElementById('downloadInvoiceBtn');
    if(downloadInvoiceBtn) downloadInvoiceBtn.onclick = ()=>{

    const nameEl = document.getElementById('f_name');

    const priceEl = document.getElementById('f_price');

    const qtyLargeEl = document.getElementById('f_qty_large');

  function tryCommitJarSizeCombo(size){
    const flavorKey = size==='large' ? 'jarLargeDraftFlavor' : 'jarSmallDraftFlavor';
    const colorKey = size==='large' ? 'jarLargeDraftColor' : 'jarSmallDraftColor';
    const combosKey = size==='large' ? 'jarLargeCombos' : 'jarSmallCombos';

    const flavor = modalOrder[flavorKey], color = modalOrder[colorKey];
    if(!flavor || !color) return false;

    if(!modalOrder[combosKey]) modalOrder[combosKey] = [];
    const maxCombos = size==='large' ? orderSettings.maxJarLarge : orderSettings.maxJarSmall;
    if(modalOrder[combosKey].length >= maxCombos) return false;

    modalOrder[combosKey].push({flavor, color});
    modalOrder[flavorKey] = ''; modalOrder[colorKey] = '';
    recomputePrice();
    return true;
  }

  function pickCakeDraft(group, unitIdx, field, value){
    const arr = group==='large' ? modalOrder.largeCakes : modalOrder.smallCakes;
    if(!arr || !arr[unitIdx]) return;
    const unit = arr[unitIdx];
    const max = group==='large' ? orderSettings.maxLarge : orderSettings.maxSmall;
    unit[field] = (unit[field] === value) ? '' : value;
    if(unit.draftFlavor && unit.draftColor){
      if(!unit.combos) unit.combos = [];
      if(unit.combos.length < max){
        unit.combos.push({flavor:unit.draftFlavor, color:unit.draftColor});
      }
      unit.draftFlavor = '';
      unit.draftColor = '';
      recomputePrice();
    }
    render();
  }

  function formatDateLong(iso){
    const [y,m,d] = iso.split('-');
    return `${y}/${m.padStart(2,'0')}/${d.padStart(2,'0')}`;
  }
